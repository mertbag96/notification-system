openapi: 3.1.0
info:
  title: Notification System API
  version: 1.0.0
  description: |
    Event-driven notification system for sending messages through SMS, Email
    and Push channels with priority queues, rate limiting, idempotency, retries,
    real-time metrics and structured observability.
servers:
  - url: http://localhost:8080
    description: Docker compose
  - url: https://notification-system.test
    description: Laravel Herd
security:
  - ApiKey: []
tags:
  - name: Notifications
  - name: Batches
  - name: Observability
  - name: Documentation
paths:
  /api/v1/notifications:
    get:
      tags: [Notifications]
      summary: List notifications
      parameters:
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/NotificationStatus' }
        - in: query
          name: channel
          schema: { $ref: '#/components/schemas/NotificationChannel' }
        - in: query
          name: batch_id
          schema: { type: string, format: uuid }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 1, maximum: 200, default: 25 }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
      responses:
        '200':
          description: Paginated notification collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Notification' }
                      meta:
                        $ref: '#/components/schemas/Pagination'
    post:
      tags: [Notifications]
      summary: Create a notification
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateNotificationRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Notification' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '409': { $ref: '#/components/responses/Conflict' }

  /api/v1/notifications/batch:
    post:
      tags: [Batches]
      summary: Create a batch of notifications (max 1000)
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [notifications]
              properties:
                notifications:
                  type: array
                  minItems: 1
                  maxItems: 1000
                  items: { $ref: '#/components/schemas/CreateNotificationRequest' }
      responses:
        '201':
          description: Batch created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Batch' }

  /api/v1/notifications/{notification}:
    get:
      tags: [Notifications]
      summary: Get a notification by id
      parameters:
        - in: path
          name: notification
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Notification
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Notification' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/notifications/{notification}/cancel:
    post:
      tags: [Notifications]
      summary: Cancel a pending or queued notification
      parameters:
        - in: path
          name: notification
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Cancelled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Notification' }
        '409': { $ref: '#/components/responses/Conflict' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/batches/{batch}:
    get:
      tags: [Batches]
      summary: Get a batch by id
      parameters:
        - in: path
          name: batch
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Batch
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Batch' }

  /api/v1/metrics:
    get:
      tags: [Observability]
      summary: Real-time metrics
      responses:
        '200':
          description: Metrics snapshot
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Metrics' }

  /api/v1/health:
    get:
      tags: [Observability]
      summary: Liveness & readiness check
      responses:
        '200':
          description: Healthy
        '503':
          description: One or more checks failed

  /api/docs:
    get:
      tags: [Documentation]
      summary: Interactive Swagger UI
      responses:
        '200':
          description: HTML

components:
  securitySchemes:
    ApiKey:
      type: apiKey
      in: header
      name: X-Api-Key
  parameters:
    CorrelationId:
      in: header
      name: X-Correlation-Id
      required: false
      schema: { type: string }
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: false
      schema: { type: string }
  responses:
    ValidationError:
      description: Invalid request data
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string }
              errors: { type: object }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
    Conflict:
      description: State conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Envelope' }
  schemas:
    Envelope:
      type: object
      properties:
        data: {}
        meta: {}
        errors:
          type: array
          items: { $ref: '#/components/schemas/Error' }
    Error:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
    Pagination:
      type: object
      properties:
        current_page: { type: integer }
        per_page: { type: integer }
        total: { type: integer }
        last_page: { type: integer }
    NotificationChannel:
      type: string
      enum: [sms, email, push]
    NotificationStatus:
      type: string
      enum: [pending, queued, processing, sent, failed, cancelled, dead_lettered]
    NotificationPriority:
      type: string
      enum: [high, normal, low]
    CreateNotificationRequest:
      type: object
      required: [channel, recipient]
      properties:
        channel: { $ref: '#/components/schemas/NotificationChannel' }
        priority: { $ref: '#/components/schemas/NotificationPriority' }
        recipient: { type: string, example: "+14155550100" }
        content: { type: string }
        payload: { type: object, additionalProperties: true }
        scheduled_at: { type: string, format: date-time }
        template_id: { type: string, format: uuid }
        template_variables:
          type: object
          additionalProperties: { type: string }
    Notification:
      type: object
      properties:
        id: { type: string, format: uuid }
        batch_id: { type: string, format: uuid, nullable: true }
        template_id: { type: string, format: uuid, nullable: true }
        channel: { $ref: '#/components/schemas/NotificationChannel' }
        priority: { $ref: '#/components/schemas/NotificationPriority' }
        status: { $ref: '#/components/schemas/NotificationStatus' }
        recipient: { type: string }
        content: { type: string }
        payload: { type: object, nullable: true, additionalProperties: true }
        provider_message_id: { type: string, nullable: true }
        attempts: { type: integer }
        last_error: { type: string, nullable: true }
        scheduled_at: { type: string, format: date-time, nullable: true }
        dispatched_at: { type: string, format: date-time, nullable: true }
        delivered_at: { type: string, format: date-time, nullable: true }
        cancelled_at: { type: string, format: date-time, nullable: true }
        correlation_id: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        attempts_log:
          type: array
          items: { $ref: '#/components/schemas/NotificationAttempt' }
    NotificationAttempt:
      type: object
      properties:
        id: { type: string, format: uuid }
        attempt_number: { type: integer }
        status: { $ref: '#/components/schemas/NotificationStatus' }
        response_status: { type: integer, nullable: true }
        latency_ms: { type: integer, nullable: true }
        error: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
    Batch:
      type: object
      properties:
        id: { type: string, format: uuid }
        correlation_id: { type: string }
        total: { type: integer }
        accepted: { type: integer }
        rejected: { type: integer }
        status_breakdown:
          type: object
          additionalProperties: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Metrics:
      type: object
      properties:
        queue_depth:
          type: object
          properties:
            high: { type: integer }
            normal: { type: integer }
            low: { type: integer }
        realtime:
          type: object
          properties:
            window_seconds: { type: integer }
            totals:
              type: object
              properties:
                success: { type: integer }
                failure: { type: integer }
                success_rate: { type: number, nullable: true }
                failure_rate: { type: number, nullable: true }
            latency_ms:
              type: object
              properties:
                p50: { type: integer, nullable: true }
                p95: { type: integer, nullable: true }
                p99: { type: integer, nullable: true }
            by_channel:
              type: object
              additionalProperties:
                type: object
                properties:
                  success: { type: integer }
                  failure: { type: integer }
                  latency_ms:
                    type: object
                    properties:
                      p50: { type: integer, nullable: true }
                      p95: { type: integer, nullable: true }
                      p99: { type: integer, nullable: true }
